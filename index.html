<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        .component-wrapper { width: 450px; height: 300px; position: relative; background: transparent; font-family: sans-serif; overflow: hidden; }
        .header { height: 30px; display: flex; justify-content: flex-end; align-items: center; padding-right: 15px; cursor: pointer; background: transparent; }
        .chart-main { height: 210px; display: flex; position: relative; }
        #batchPanel { position: absolute; top: 30px; left: 0; width: 450px; height: 270px; background: rgba(255, 255, 255, 0.95); z-index: 100; display: none; overflow-y: auto; padding: 10px; box-sizing: border-box; }
        .batch-row { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; font-size: 11px; }
        .batch-row input { width: 45px; }
        .batch-row input[id^="n"] { width: 60px; }
        .legend-area { height: 40px; display: flex; justify-content: center; align-items: center; gap: 20px; font-size: 12px; background: transparent; }
        .legend-item { display: flex; align-items: center; gap: 5px; background: #e0e0e0; padding: 2px 8px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="component-wrapper">
    <div class="header" onclick="document.getElementById('batchPanel').style.display='block'">⚙️</div>
    
    <div id="batchPanel">
        <div style="font-weight:bold; margin-bottom:5px;">
            系列A:<input type="text" id="legA" value="指标 A"> 
            系列B:<input type="text" id="legB" value="指标 B">
            <button onclick="saveBatch()">保存</button>
        </div>
        <div id="batchFields"></div>
    </div>

    <div class="chart-main">
        <canvas id="mainChartCanvas" width="450" height="210"></canvas>
    </div>

    <div class="legend-area" id="legendContainer"></div>
</div>

<script>
    const initialData = [
        { name: "组1", valA: 60, valB: 100 }, { name: "组2", valA: 70, valB: 100 },
        { name: "组3", valA: 30, valB: 50 }, { name: "组4", valA: 41, valB: 80 },
        { name: "组5", valA: 50, valB: 80 }, { name: "组6", valA: 60, valB: 80 },
        { name: "组7", valA: 70, valB: 90 }, { name: "组8", valA: 80, valB: 100 },
        { name: "组9", valA: 60, valB: 80 }, { name: "组10", valA: 70, valB: 90 },
        { name: "组11", valA: 70, valB: 80 }, { name: "组12", valA: 40, valB: 50 },
        { name: "组13", valA: 60, valB: 100 }, { name: "组14", valA: 70, valB: 100 },
        { name: "组15", valA: 30, valB: 50 }, { name: "组16", valA: 41, valB: 80 },
        { name: "组17", valA: 50, valB: 80 }, { name: "组18", valA: 60, valB: 90 },
        { name: "组19", valA: 70, valB: 90 }, { name: "组20", valA: 40, valB: 50 },
        { name: "组21", valA: 60, valB: 100 }
    ];

    const canvas = document.getElementById('mainChartCanvas');
    const ctx = canvas.getContext('2d');
    const BASE_Y = 180;
    let data = [...initialData];
    let offset = 0;
    let isPaused = false;

    function drawLabel(text, x, y, color = "#e0e0e0") {
        ctx.font = "10px sans-serif";
        const metrics = ctx.measureText(text);
        const padding = 4;
        const width = metrics.width + padding * 2;
        const height = 16;
        
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.roundRect(x - width/2, y - 12, width, height, 3);
        ctx.fill();
        
        ctx.fillStyle = "#000";
        ctx.textAlign = "center";
        ctx.fillText(text, x, y);
    }

    function updateLegend() {
        const legA = document.getElementById('legA').value;
        const legB = document.getElementById('legB').value;
        document.getElementById('legendContainer').innerHTML = `
            <div class="legend-item"><span style="color:#4facfe">■</span> ${legA}</div>
            <div class="legend-item"><span style="color:#6a11cb">■</span> ${legB}</div>
        `;
    }

    function initBatch() {
        document.getElementById('batchFields').innerHTML = data.map((d, i) => `
            <div class="batch-row">
                名称:<input value="${d.name}" id="n${i}">
                A:<input type="number" value="${d.valA}" id="a${i}">
                B:<input type="number" value="${d.valB}" id="b${i}">
            </div>
        `).join('');
        updateLegend();
    }

    function saveBatch() {
        updateLegend();
        for(let i=0; i<data.length; i++) {
            data[i] = {
                name: document.getElementById('n'+i).value,
                valA: parseFloat(document.getElementById('a'+i).value),
                valB: parseFloat(document.getElementById('b'+i).value)
            };
        }
        document.getElementById('batchPanel').style.display = 'none';
    }

    canvas.addEventListener('mouseenter', () => isPaused = true);
    canvas.addEventListener('mouseleave', () => { isPaused = false; requestAnimationFrame(animate); });

    function animate() {
        if (isPaused) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        offset -= 0.8;
        if (Math.abs(offset) >= data.length * 80) offset = 0;

        for(let i=0; i<=3; i++) {
            drawLabel((i*50).toString(), 20, BASE_Y - i*50);
        }

        for (let i = 0; i < data.length * 2; i++) {
            const idx = i % data.length;
            const groupX = 80 + i * 80 + offset;
            
            let gradA = ctx.createLinearGradient(0, BASE_Y - data[idx].valA, 0, BASE_Y);
            gradA.addColorStop(0, '#7ce4f5'); gradA.addColorStop(1, '#4facfe');
            ctx.fillStyle = gradA;
            ctx.fillRect(groupX - 22, BASE_Y - data[idx].valA, 20, data[idx].valA);

            let gradB = ctx.createLinearGradient(0, BASE_Y - data[idx].valB, 0, BASE_Y);
            gradB.addColorStop(0, '#9d50bb'); gradB.addColorStop(1, '#6a11cb');
            ctx.fillStyle = gradB;
            ctx.fillRect(groupX + 2, BASE_Y - data[idx].valB, 20, data[idx].valB);

            drawLabel(data[idx].valA.toString(), groupX - 12, BASE_Y - data[idx].valA - 5);
            drawLabel(data[idx].valB.toString(), groupX + 12, BASE_Y - data[idx].valB - 5);
            drawLabel(data[idx].name, groupX, BASE_Y + 15);
        }
        requestAnimationFrame(animate);
    }

    initBatch();
    animate();
</script>
</body>
</html>
